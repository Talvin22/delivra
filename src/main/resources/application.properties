spring.application.name=delivra

server.servlet.context-path=/

server.port=8189

jwt.secret=REMOVED_SECRET
jwt.lifetime=3600000
jwt.expiration=103600000

spring.datasource.url=jdbc:postgresql://localhost:5432/delivra
spring.datasource.username=postgres
spring.datasource.password=REMOVED_SECRET
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.default_schema=v1_delivra_service
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=v1_delivra_service

logging.level.com.post_hub.iam_service=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.org.flywaydb=DEBUG

#Swagger configuration
swagger.servers.first=http://localhost:8100
swagger.servers.second=http://localhost:8189
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

spring.kafka.retry.topic.enabled=true

#Actuator configuration
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

#Consul configuration
spring.cloud.consul.host=localhost
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.register=true
spring.cloud.consul.discovery.enabled=true
spring.cloud.consul.discovery.health-check-path=/actuator/health
spring.cloud.consul.discovery.health-check-interval=10s
spring.cloud.consul.discovery.prefer-ip-address=true

#HERE API configuration
here.api.key=REMOVED_SECRET
here.api.geocoding.base-url=https://geocode.search.hereapi.com/v1/geocode
here.api.routing.base-url=https://router.hereapi.com/v8/routes

#Default truck parameters (weight in kg, dimensions in cm)
here.api.truck.default-gross-weight=12000
here.api.truck.default-height=400
here.api.truck.default-width=250
here.api.truck.default-length=1200

#Navigation settings
navigation.off-route-threshold-meters=200
