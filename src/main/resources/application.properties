spring.application.name=delivra

server.servlet.context-path=/
server.port=8189

jwt.secret=${JWT_SECRET}
jwt.lifetime=3600
jwt.expiration=3600

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/delivra}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.default_schema=v1_delivra_service
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=v1_delivra_service

logging.level.site.delivra=INFO
logging.level.org.springframework.web=WARN
logging.level.org.flywaydb=WARN

swagger.servers.first=http://localhost:8100
swagger.servers.second=http://localhost:8189
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

here.api.key=${HERE_API_KEY}
here.api.geocoding.base-url=https://geocode.search.hereapi.com/v1/geocode
here.api.routing.base-url=https://router.hereapi.com/v8/routes

here.api.truck.default-gross-weight=12000
here.api.truck.default-height=400
here.api.truck.default-width=250
here.api.truck.default-length=1200

navigation.off-route-threshold-meters=200
navigation.reroute-cooldown-seconds=30

websocket.allowed-origins=${WS_ALLOWED_ORIGINS}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.mail.enabled=${MAIL_ENABLED:true}
app.mail.from.name=${MAIL_FROM_NAME:Delivra Notifications}
app.base-url=${APP_BASE_URL:http://localhost:5173}

management.health.mail.enabled=false

server.tomcat.max-http-form-post-size=1MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.upload.dir=${UPLOAD_DIR:uploads}
